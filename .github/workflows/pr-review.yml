# PR review — thin caller for the org peer-review merge gate (tsp-8ny, tsp-mx3).
#
# Copies the canonical thin caller from `pocketforge-os/shared-workflows` (the
# org's reusable-workflow repo). Keep the job id `pf-pr-review`: the org-wide
# required-check context `pf-pr-review / review` must be uniform across every
# repo for the org ruleset to gate on it.
#
# `@main` is deliberately mutable (matches runtime + platform callers): the gate
# re-fetches its review tooling from `pocketforge-automation` origin/main at run
# time regardless, so a SHA pin here would not pin behaviour.

name: PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  pf-pr-review:
    uses: pocketforge-os/shared-workflows/.github/workflows/pr-review-gate.yml@main
